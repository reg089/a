<style>
:root{
  --bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--text:#e2e8f0;--text2:#94a3b8;
  --accent:#38bdf8;--accent2:#10b981;--danger:#ef4444;--warning:#f59e0b;
  --radius:12px;--shadow:0 8px 24px rgba(0,0,0,0.3)
}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh}
.hidden{display:none!important}
.container{max-width:1100px;margin:auto;padding:20px;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:var(--bg2);padding:28px;border-radius:var(--radius);box-shadow:var(--shadow)}
.login-card{width:100%;max-width:420px}
input,select,button,textarea{
  width:100%;padding:12px 16px;margin:8px 0;border-radius:10px;
  border:1px solid var(--bg3);background:var(--bg3);color:var(--text);
  font-size:16px;outline:none;transition:0.2s
}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(56,189,248,0.2)}
.btn{background:var(--accent);color:#000;font-weight:600;cursor:pointer;border:none}
.btn:hover{opacity:0.9;transform:translateY(-1px)}
.btn-secondary{background:var(--bg3);color:var(--text)}
.btn-danger{background:var(--danger);color:#fff}
.sidebar{
  width:260px;position:fixed;height:100vh;background:var(--bg2);
  padding:24px;border-right:1px solid var(--bg3);transition:0.3s;z-index:100
}
.sidebar h3{margin-bottom:24px;color:var(--accent);font-size:1.4rem}
.nav-btn{
  width:100%;padding:12px 16px;margin:6px 0;border-radius:10px;
  background:transparent;color:var(--text);text-align:left;cursor:pointer;
  transition:0.2s;display:flex;align-items:center;gap:10px
}
.nav-btn:hover{background:var(--bg3)}
.nav-btn.active{background:var(--accent);color:#000}
.main{margin-left:260px;padding:28px;transition:0.3s}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg2);padding:20px;border-radius:var(--radius);box-shadow:var(--shadow)}
.stat-card h3{color:var(--text2);font-size:0.85rem;text-transform:uppercase;margin-bottom:8px}
.stat-card h2{font-size:2rem}
.table-wrap{overflow-x:auto;border-radius:10px}
table{width:100%;border-collapse:collapse;min-width:600px}
th,td{padding:12px 16px;text-align:left;border-bottom:1px solid var(--bg3)}
th{color:var(--text2);font-size:0.85rem;text-transform:uppercase}
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:0.8rem;font-weight:600}
.badge-admin{background:rgba(239,68,68,0.2);color:var(--danger)}
.badge-teacher{background:rgba(245,158,11,0.2);color:var(--warning)}
.badge-student{background:rgba(16,185,129,0.2);color:var(--accent2)}
.toast{
  position:fixed;bottom:24px;right:24px;background:var(--accent2);color:#fff;
  padding:14px 20px;border-radius:10px;opacity:0;transform:translateY(20px);
  transition:0.3s;z-index:1000;box-shadow:var(--shadow)
}
.toast.show{opacity:1;transform:translateY(0)}
.toast.error{background:var(--danger)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99}
.overlay.show{display:block}
.menu-toggle{display:none;background:var(--accent);border:none;color:#000;padding:10px 14px;border-radius:10px}
.loading{display:inline-block;width:16px;height:16px;border:2px solid currentColor;border-top:transparent;border-radius:50%;animation:spin 0.8s linear infinite}
.chat-box{height:300px;overflow-y:auto;background:var(--bg3);padding:12px;border-radius:10px;margin-bottom:12px}
.chat-msg{margin:8px 0;padding:10px;border-radius:8px}
.chat-msg.user{background:var(--accent);color:#000}
.chat-msg.ai{background:var(--bg2)}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){
 .sidebar{left:-260px}
 .sidebar.show{left:0}
 .main{margin-left:0;padding:18px}
 .menu-toggle{display:block}
}
