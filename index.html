<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SmartEdu Enterprise</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

<style>
:root{
  --bg:#0f172a;--bg2:#1e293b;--bg3:#334155;
  --text:#e2e8f0;--text2:#94a3b8;
  --accent:#38bdf8;--accent2:#10b981;
  --danger:#ef4444;--warning:#f59e0b;
  --radius:12px;--shadow:0 8px 24px rgba(0,0,0,0.3);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
}

.hidden{display:none!important}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card{
  background:var(--bg2);
  padding:28px;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}

.login-card{width:100%;max-width:420px}

input,select,button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid var(--bg3);
  background:var(--bg3);
  color:var(--text);
  font-size:16px;
}

.btn{background:var(--accent);color:#000;border:none;cursor:pointer;font-weight:600}
.btn:hover{opacity:0.9}

.sidebar{
  width:260px;
  position:fixed;
  height:100vh;
  background:var(--bg2);
  padding:20px;
}

.nav-btn{
  width:100%;
  padding:12px;
  margin:6px 0;
  background:transparent;
  color:var(--text);
  border:none;
  text-align:left;
  cursor:pointer;
}

.nav-btn.active{background:var(--accent);color:#000}

.main{margin-left:260px;padding:20px}

.page{display:none}
.page.active{display:block}

/* BILLING PRINT FIX */
@media print{
  #billingWrapper .action-buttons,
  #billingWrapper .students-panel,
  #billingWrapper .search-box,
  #billingWrapper .summary-cards,
  #billingWrapper .notification{
    display:none!important;
  }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="container">
  <div class="card login-card">
    <h2>SmartEdu Enterprise</h2>

    <select id="staffRole">
      <option value="admin">Admin</option>
      <option value="teacher">Teacher</option>
    </select>

    <input type="password" id="staffPass" placeholder="Password">
    <button class="btn" id="staffLoginBtn">Login</button>

    <hr>

    <input id="studentName" placeholder="Student Name">
    <button class="btn" id="studentLoginBtn">Enter as Student</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="sidebar">
  <button class="nav-btn active" data-page="dashboard">Dashboard</button>
  <button class="nav-btn" data-page="students">Students</button>
  <button class="nav-btn" data-page="attendance">Attendance</button>
  <button class="nav-btn" data-page="fees">Fees</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
  <h2>Dashboard</h2>
</div>

<!-- STUDENTS -->
<div id="students" class="page">
  <h2>Students</h2>
  <input id="sName" placeholder="Name">
  <input id="sClass" placeholder="Class">
  <button class="btn" id="addStudentBtn">Add</button>
  <div id="studentList"></div>
</div>

<!-- ATTENDANCE -->
<div id="attendance" class="page">
  <h2>Attendance</h2>
  <div id="attendanceList"></div>
</div>

<!-- FEES -->
<div id="fees" class="page">
  <h2>Fees</h2>
</div>

</div>
</div>

<script>
/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyCdirNElI9jmhlGhOmEg4UkhdmHhzprjyw",
  authDomain: "billing-system-27bc6.firebaseapp.com",
  projectId: "billing-system-27bc6",
  storageBucket: "billing-system-27bc6.appspot.com",
  messagingSenderId: "852317046663",
  appId: "1:852317046663:web:45cff5ac469552228b3522"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let userRole = "student";

/* ================= LOGIN ================= */
document.getElementById("staffLoginBtn").onclick = async ()=>{
  const pass = document.getElementById("staffPass").value;
  userRole = document.getElementById("staffRole").value;

  const doc = await db.collection("settings").doc("passwords").get();
  if(pass !== doc.data()[userRole+"Pass"]){
    return alert("Wrong password");
  }

  const cred = await auth.signInAnonymously();
  currentUser = cred.user;
  showApp();
};

document.getElementById("studentLoginBtn").onclick = async ()=>{
  const name = document.getElementById("studentName").value;
  if(!name) return alert("Enter name");

  const cred = await auth.signInAnonymously();
  currentUser = cred.user;
  userRole = "student";
  showApp();
};

/* ================= APP ================= */
function showApp(){
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  loadStudents();
}

/* ================= STUDENTS ================= */
document.getElementById("addStudentBtn").onclick = async ()=>{
  const name = document.getElementById("sName").value;
  const cls = document.getElementById("sClass").value;

  await db.collection("students").add({name, class:cls});
  loadStudents();
};

function loadStudents(){
  db.collection("students").onSnapshot(snap=>{
    let html = "";
    snap.forEach(doc=>{
      const d = doc.data();
      html += `<p>${d.name} - ${d.class}</p>`;
    });
    document.getElementById("studentList").innerHTML = html;
    loadAttendanceList(snap.docs);
  });
}

/* ================= ATTENDANCE FIXED ================= */
function loadAttendanceList(students){
  let html = "";

  students.forEach(doc=>{
    const d = doc.data();
    html += `
      <div style="display:flex;justify-content:space-between;margin:8px 0">
        <span>${d.name} - ${d.class}</span>
        <button onclick="markAttendance('${doc.id}')">Present</button>
      </div>
    `;
  });

  document.getElementById("attendanceList").innerHTML =
    html || "<p>No students</p>";
}

async function markAttendance(id){
  await db.collection("attendance").add({
    studentId:id,
    status:"Present",
    date:new Date().toISOString().split("T")[0]
  });

  alert("Attendance marked");
}

/* ================= NAV ================= */
document.querySelectorAll(".nav-btn").forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(btn.dataset.page).classList.add("active");
  };
});
</script>

</body>
</html>
