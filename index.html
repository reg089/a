<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartEdu Enterprise</title>

<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

<style>
:root{
--bg:#0f172a;
--card:#1e293b;
--text:#f1f5f9;
--muted:#94a3b8;
--accent:#38bdf8;
--green:#10b981;
--danger:#ef4444;
--border:#334155;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
}

.hidden{
display:none;
}

/* LOGIN */
.login-screen{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.login-card{
background:var(--card);
padding:30px;
border-radius:20px;
width:100%;
max-width:400px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.login-card h1{
margin-bottom:10px;
}

.login-card p{
color:var(--muted);
margin-bottom:20px;
}

input,select,button{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:12px;
margin-top:12px;
font-size:15px;
}

input,select{
background:#334155;
color:white;
}

button{
background:var(--accent);
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

/* APP */
.app{
display:flex;
min-height:100vh;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:#111827;
padding:20px;
border-right:1px solid var(--border);
}

.sidebar h2{
margin-bottom:25px;
color:var(--accent);
}

.nav-btn{
background:transparent;
color:white;
text-align:left;
padding:14px;
border-radius:12px;
margin-bottom:10px;
border:1px solid transparent;
}

.nav-btn:hover{
background:#1e293b;
}

.nav-btn.active{
background:var(--accent);
color:black;
}

/* MAIN */
.main{
flex:1;
padding:20px;
overflow:auto;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
gap:10px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:25px;
}

.card{
background:var(--card);
padding:20px;
border-radius:20px;
border:1px solid var(--border);
}

.card h3{
color:var(--muted);
font-size:14px;
margin-bottom:10px;
}

.card h2{
font-size:28px;
}

.page{
display:none;
}

.page.active{
display:block;
}

/* BILLING */
.dashboard{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.students-panel{
width:320px;
background:var(--card);
padding:20px;
border-radius:20px;
border:1px solid var(--border);
}

.detail-panel{
flex:1;
min-width:300px;
background:var(--card);
padding:20px;
border-radius:20px;
border:1px solid var(--border);
}

.student-item{
background:#334155;
padding:12px;
border-radius:12px;
margin-bottom:10px;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
}

.student-item:hover{
background:#475569;
}

.balance{
background:white;
color:black;
padding:4px 10px;
border-radius:20px;
font-size:12px;
font-weight:bold;
}

.form-row{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:15px;
}

.form-group{
flex:1;
min-width:120px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
text-align:left;
font-size:14px;
}

.toast{
position:fixed;
bottom:20px;
right:20px;
background:var(--green);
padding:12px 18px;
border-radius:12px;
display:none;
}

@media(max-width:768px){

.app{
flex-direction:column;
}

.sidebar{
width:100%;
display:flex;
overflow:auto;
gap:10px;
}

.sidebar h2{
display:none;
}

.nav-btn{
min-width:150px;
}

.dashboard{
flex-direction:column;
}

.students-panel{
width:100%;
}

}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-screen" id="loginPage">
<div class="login-card">
<h1>SmartEdu Enterprise</h1>
<p>School Management System</p>

<select id="role">
<option value="admin">Admin</option>
<option value="teacher">Teacher</option>
<option value="student">Student</option>
</select>

<input type="password" id="password" placeholder="Enter password">

<button onclick="login()">LOGIN</button>
</div>
</div>

<!-- APP -->
<div class="app hidden" id="app">

<!-- SIDEBAR -->
<div class="sidebar">

<h2>SmartEdu</h2>

<button class="nav-btn active" onclick="showPage('dashboard',this)">
📊 Dashboard
</button>

<button class="nav-btn" onclick="showPage('billing',this)">
💰 Billing
</button>

<button class="nav-btn" onclick="logout()">
🚪 Logout
</button>

</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<h1 id="pageTitle">Dashboard</h1>
<div id="userInfo"></div>
</div>

<!-- DASHBOARD -->
<div class="page active" id="dashboard">

<div class="cards">

<div class="card">
<h3>Total Students</h3>
<h2 id="studentCount">0</h2>
</div>

<div class="card">
<h3>Total Collected</h3>
<h2 id="totalCollected">UGX 0</h2>
</div>

<div class="card">
<h3>Total Pending</h3>
<h2 id="totalPending">UGX 0</h2>
</div>

</div>

</div>

<!-- BILLING -->
<div class="page" id="billing">

<div class="dashboard">

<!-- LEFT -->
<div class="students-panel">

<h2>Students</h2>

<input type="text" id="searchStudent" placeholder="Search student">

<div id="studentList" style="margin-top:15px"></div>

<hr style="margin:20px 0;border-color:#334155">

<h3>Add Student</h3>

<input type="text" id="studentName" placeholder="Student Name">

<input type="text" id="studentClass" placeholder="Class">

<button onclick="addStudent()">
Add Student
</button>

</div>

<!-- RIGHT -->
<div class="detail-panel">

<div id="studentDetails">

<p>Select a student to manage billing.</p>

</div>

</div>

</div>

</div>

</div>

</div>

<div class="toast" id="toast"></div>

<script>
/* LOGIN */

const PASSWORD = "12345";

function login(){

const role=document.getElementById("role").value;
const pass=document.getElementById("password").value;

if(pass!==PASSWORD){
showToast("Wrong Password");
return;
}

localStorage.setItem("smartedu_login","yes");
localStorage.setItem("smartedu_role",role);

document.getElementById("loginPage").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");

document.getElementById("userInfo").innerHTML=
"Logged in as: <b>"+role+"</b>";

}

window.onload=function(){

if(localStorage.getItem("smartedu_login")==="yes"){

document.getElementById("loginPage").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");

document.getElementById("userInfo").innerHTML=
"Logged in as: <b>"+localStorage.getItem("smartedu_role")+"</b>";

}

renderStudents();
updateDashboard();

}

/* NAVIGATION */

function showPage(id,btn){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active");
});

document.getElementById(id).classList.add("active");

document.querySelectorAll(".nav-btn").forEach(b=>{
b.classList.remove("active");
});

btn.classList.add("active");

document.getElementById("pageTitle").innerText=
btn.innerText.trim();

}

/* LOGOUT */

function logout(){

localStorage.removeItem("smartedu_login");
localStorage.removeItem("smartedu_role");

location.reload();

}

/* DATA */

let students=JSON.parse(localStorage.getItem("students")||"[]");

function saveData(){
localStorage.setItem("students",JSON.stringify(students));
}

/* UTILITIES */

function formatMoney(num){
return "UGX "+Number(num).toLocaleString();
}

function showToast(msg){

const toast=document.getElementById("toast");

toast.innerText=msg;
toast.style.display="block";

setTimeout(()=>{
toast.style.display="none";
},2000);

}

/* ADD STUDENT */

function addStudent(){

const name=document.getElementById("studentName").value.trim();
const cls=document.getElementById("studentClass").value.trim();

if(!name || !cls){
showToast("Fill all fields");
return;
}

students.push({
id:Date.now(),
name,
className:cls,
fees:[],
payments:[]
});

saveData();

document.getElementById("studentName").value="";
document.getElementById("studentClass").value="";

renderStudents();
updateDashboard();

showToast("Student Added");

}

/* RENDER STUDENTS */

function renderStudents(){

const list=document.getElementById("studentList");

if(students.length===0){

list.innerHTML="<p>No students added</p>";
return;

}

list.innerHTML="";

students.forEach(student=>{

const fees=student.fees.reduce((a,b)=>a+b.amount,0);
const paid=student.payments.reduce((a,b)=>a+b.amount,0);
const balance=fees-paid;

const div=document.createElement("div");

div.className="student-item";

div.innerHTML=`
<div>
<b>${student.name}</b><br>
<small>${student.className}</small>
</div>

<div class="balance">
${formatMoney(balance)}
</div>
`;

div.onclick=()=>openStudent(student.id);

list.appendChild(div);

});

}

/* OPEN STUDENT */

function openStudent(id){

const student=students.find(s=>s.id===id);

if(!student) return;

const fees=student.fees.reduce((a,b)=>a+b.amount,0);
const paid=student.payments.reduce((a,b)=>a+b.amount,0);
const balance=fees-paid;

document.getElementById("studentDetails").innerHTML=`

<h2>${student.name}</h2>

<p>${student.className}</p>

<br>

<h3>Balance: ${formatMoney(balance)}</h3>

<hr style="margin:20px 0;border-color:#334155">

<h3>Add Fee</h3>

<div class="form-row">

<div class="form-group">
<input type="text" id="feeDesc" placeholder="Fee Description">
</div>

<div class="form-group">
<input type="number" id="feeAmount" placeholder="Amount">
</div>

<div class="form-group">
<button onclick="addFee(${student.id})">
Add Fee
</button>
</div>

</div>

<h3 style="margin-top:20px">Add Payment</h3>

<div class="form-row">

<div class="form-group">
<input type="number" id="payAmount" placeholder="Amount">
</div>

<div class="form-group">
<button onclick="addPayment(${student.id})">
Add Payment
</button>
</div>

</div>

<h3 style="margin-top:25px">Fees</h3>

<table>

<thead>
<tr>
<th>Description</th>
<th>Amount</th>
</tr>
</thead>

<tbody>

${student.fees.map(f=>`
<tr>
<td>${f.description}</td>
<td>${formatMoney(f.amount)}</td>
</tr>
`).join("")}

</tbody>

</table>

<h3 style="margin-top:25px">Payments</h3>

<table>

<thead>
<tr>
<th>Amount</th>
</tr>
</thead>

<tbody>

${student.payments.map(p=>`
<tr>
<td>${formatMoney(p.amount)}</td>
</tr>
`).join("")}

</tbody>

</table>
`;

}

/* ADD FEE */

function addFee(id){

const student=students.find(s=>s.id===id);

const desc=document.getElementById("feeDesc").value.trim();
const amount=Number(document.getElementById("feeAmount").value);

if(!desc || !amount){
showToast("Fill fee details");
return;
}

student.fees.push({
description:desc,
amount
});

saveData();

openStudent(id);
renderStudents();
updateDashboard();

showToast("Fee Added");

}

/* ADD PAYMENT */

function addPayment(id){

const student=students.find(s=>s.id===id);

const amount=Number(document.getElementById("payAmount").value);

if(!amount){
showToast("Enter payment amount");
return;
}

student.payments.push({
amount
});

saveData();

openStudent(id);
renderStudents();
updateDashboard();

showToast("Payment Added");

}

/* DASHBOARD */

function updateDashboard(){

document.getElementById("studentCount").innerText=
students.length;

let collected=0;
let pending=0;

students.forEach(s=>{

const fees=s.fees.reduce((a,b)=>a+b.amount,0);
const paid=s.payments.reduce((a,b)=>a+b.amount,0);

collected+=paid;
pending+=(fees-paid);

});

document.getElementById("totalCollected").innerText=
formatMoney(collected);

document.getElementById("totalPending").innerText=
formatMoney(pending);

}
</script>

</body>
</html>
